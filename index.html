<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Pénal — République</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-badge">⚖</div>
    <span class="brand-name">Code Pénal</span>
    <span class="brand-tag">République · JDR</span>
  </div>
</div>
<!-- ── HERO STRIP ── -->
<div class="hero-strip">
  <div>
    <div class="hero-eyebrow">Recueil officiel</div>
    <div class="hero-title">Code<br><span class="dim">Pénal</span></div>
    <div class="hero-sub">Infractions &amp; sanctions applicables</div>
  </div>
  <div class="hero-stats">
    <div class="hstat">
      <div class="hstat-num" id="sTotal">0</div>
      <div class="hstat-bar"><div class="hstat-fill" style="width:100%"></div></div>
      <div class="hstat-label">Articles</div>
    </div>
    <div class="hstat">
      <div class="hstat-num" id="sPrison">0</div>
      <div class="hstat-bar"><div class="hstat-fill" id="bPrison" style="width:0%"></div></div>
      <div class="hstat-label">Prison</div>
    </div>
    <div class="hstat">
      <div class="hstat-num" id="sGarde">0</div>
      <div class="hstat-bar"><div class="hstat-fill" id="bGarde" style="width:0%"></div></div>
      <div class="hstat-label">Garde à vue</div>
    </div>
    <div class="hstat">
      <div class="hstat-num" id="sPoints">0</div>
      <div class="hstat-bar"><div class="hstat-fill" id="bPoints" style="width:0%"></div></div>
      <div class="hstat-label">Retrait pts</div>
    </div>
    <div class="hstat">
      <div class="hstat-num" id="sSusp">0</div>
      <div class="hstat-bar"><div class="hstat-fill" id="bSusp" style="width:0%"></div></div>
      <div class="hstat-label">Suspension</div>
    </div>
  </div>
</div>
<!-- ── LAYOUT ── -->
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="s-label">Recherche</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-box" id="searchInput" type="text" placeholder="Article, infraction…" autocomplete="off">
      </div>
    </div>
    <div>
      <div class="s-label">Catégories</div>
      <div class="cat-list" id="catList"></div>
    </div>
  </aside>
  <!-- CONTENT -->
  <div class="content-area">
    <div class="toolbar-row">
      <div class="toolbar-left">
        <span class="section-label">Articles en vigueur</span>
      </div>
      <span class="view-count" id="contentCount">—</span>
    </div>
    <div class="articles-grid" id="articlesList"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
